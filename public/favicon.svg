<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Metallic Gold Gradient -->
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4D068" />
      <stop offset="50%" stop-color="#C5A059" />
      <stop offset="100%" stop-color="#8E6F33" />
    </linearGradient>
    <!-- Deep Emerald Glow Radial -->
    <radialGradient id="emerald-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0E3D30" />
      <stop offset="100%" stop-color="#051C16" />
    </radialGradient>
  </defs>

  <!-- Deep Emerald Circular Shield Background -->
  <circle cx="256" cy="256" r="240" fill="url(#emerald-glow)" stroke="#1C4F41" stroke-width="8" />

  <!-- Outer Elegant Gold Ring -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="url(#gold-gradient)" stroke-width="4" stroke-dasharray="12 8" opacity="0.8" />

  <!-- Polished Minimalist Human-Centric '人' (REN) Icon Emblem -->
  <!-- Designed with thick-to-thin elegant calligraphy line weights -->
  <g transform="translate(0, 5)">
    <!-- Left falling stroke curve -->
    <path d="M 285 140 C 270 180, 240 250, 150 360 C 140 372, 160 384, 172 372 C 255 270, 280 200, 298 140 C 302 128, 289 128, 285 140 Z" fill="url(#gold-gradient)" />
    
    <!-- Right supportive stable stroke -->
    <path d="M 252 235 C 275 265, 310 320, 365 362 C 374 369, 386 353, 376 345 C 325 305, 292 255, 268 220 C 260 210, 246 220, 252 235 Z" fill="url(#gold-gradient)" />
    
    <!-- Delicate central core geometric pip -->
    <circle cx="256" cy="115" r="14" fill="url(#gold-gradient)" />
  </g>
</svg>
